name: Build DramaBox Tweak
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build Dylib
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$THEOS/bin:$PATH
          # 'make' compiles the dylib. We ignore the 'package' errors.
          make FINALPACKAGE=1
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: DramaBox-Unlocked-Dylib
          # This is the exact location of the file you just built
          path: .theos/obj/debug/DramaBoxUnlock.dylib
