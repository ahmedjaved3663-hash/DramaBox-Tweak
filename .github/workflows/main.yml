name: Build DramaBox Tweak
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build Dylib
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$THEOS/bin:$PATH
          # We use 'make' instead of 'make package' to avoid the filter error
          make FINALPACKAGE=1
          
     - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: DramaBox-Unlocked-Dylib
          # This updated path points to where your file actually is
          path: .theos/obj/debug/DramaBoxUnlock.dylib
