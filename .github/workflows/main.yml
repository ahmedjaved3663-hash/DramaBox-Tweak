name: Build DramaBox Tweak
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build Dylib
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$THEOS/bin:$PATH
          make FINALPACKAGE=1
          
          # This part finds the file and moves it to the main folder
          find .theos/obj -name "DramaBoxUnlock.dylib" -exec cp {} $GITHUB_WORKSPACE/DramaBoxUnlock.dylib \;

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: DramaBox-Unlocked-Dylib
          path: DramaBoxUnlock.dylib
